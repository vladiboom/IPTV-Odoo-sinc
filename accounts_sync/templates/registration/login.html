{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Bridge | Login</title>
    {% tailwind_css %}
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-slate-900 min-h-screen flex items-center justify-center text-slate-100 p-4">
    <div
        class="w-full max-w-md bg-slate-800 rounded-3xl shadow-2xl overflow-hidden border border-slate-700/50 relative">
        <div class="absolute inset-0 bg-gradient-to-br from-indigo-500/10 to-slate-900/50 pointer-events-none"></div>
        <div class="relative p-10 flex flex-col items-center">

            <!-- Logo Section -->
            <div class="w-24 h-24 mb-6 relative">
                <div class="absolute inset-0 bg-orange-500 rounded-full blur-[20px] opacity-30 animate-pulse"></div>
                <!-- Usa el logo copiado o SVG temporal -->
                <img src="{% static 'img/logo.png' %}" alt="Power Logo"
                    class="w-full h-full object-contain relative z-10 filter drop-shadow-[0_0_10px_rgba(249,115,22,0.5)]">
            </div>

            <h1 class="text-2xl font-black text-white text-center mb-2 tracking-tight">Acceso Restringido</h1>
            <p
                class="text-xs font-bold text-slate-400 uppercase tracking-widest text-center mb-8 border-b border-slate-700 pb-6 w-full">
                2026 Sistema de sincronizacion Odoo - IPTV</p>

            <form method="post" action="{% url 'login' %}" class="w-full space-y-5">
                {% csrf_token %}
                {% if form.errors %}
                <div
                    class="bg-red-500/10 border border-red-500/50 text-red-400 p-3 rounded-xl text-xs text-center font-bold font-mono">
                    Credenciales inválidas. Por favor intente de nuevo.
                </div>
                {% endif %}

                <div class="space-y-1">
                    <label class="text-[10px] uppercase tracking-widest text-slate-400 font-bold ml-1">Usuario</label>
                    <input type="text" name="username" autofocus required
                        class="w-full bg-slate-900/50 border border-slate-700 text-white px-4 py-3.5 rounded-2xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all font-mono placeholder:text-slate-600"
                        placeholder="ej. administrador">
                </div>

                <div class="space-y-1">
                    <label
                        class="text-[10px] uppercase tracking-widest text-slate-400 font-bold ml-1">Contraseña</label>
                    <input type="password" name="password" required
                        class="w-full bg-slate-900/50 border border-slate-700 text-white px-4 py-3.5 rounded-2xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 transition-all font-mono placeholder:text-slate-600"
                        placeholder="••••••••">
                </div>

                <button type="submit"
                    class="w-full bg-gradient-to-r from-orange-600 to-orange-500 hover:from-orange-500 hover:to-orange-400 text-white font-black py-4 px-6 rounded-2xl shadow-[0_0_20px_rgba(249,115,22,0.3)] transition-all transform hover:scale-[1.02] active:scale-[0.98] uppercase tracking-widest text-sm mt-4">
                    Iniciar Sesión
                </button>
            </form>

            <div class="mt-10 mb-2 border-t border-slate-700/50 pt-6 w-full text-center">
                <p class="text-[9px] font-black text-slate-500 uppercase tracking-widest">
                    Desarrollado por ING Vicente
                </p>
            </div>

        </div>
    </div>
</body>

</html>
